<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Message</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    display:flex;
    height:100vh;
}

/* LEFT LIST */
.sidebar{
    width:280px;
    background:#f5f5f5;
    border-right:1px solid #ddd;
    overflow-y:auto;
}

.player{
    padding:14px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

.player:hover{
    background:#e9e9e9;
}

.player.active{
    background:#d9ecff;
}

/* MAIN AREA */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button{
    padding:14px 24px;
    font-size:16px;
    border:none;
    background:#2a7cff;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e5edb;
}

.status{
    margin-top:15px;
    color:green;
}

/* MOBILE */
@media (max-width:700px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
    height:200px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="sidebar" id="playerList"></div>

<div class="main">
<h2 id="selectedPlayer">Select Player</h2>

<button onclick="sendMessage()">Send Message</button>

<div class="status" id="status"></div>
</div>

</div>

<script>

/* Sample player list */
const players = [
"Messi",
"Ronaldo",
"Neymar",
"Mbappe",
"Haaland",
"De Bruyne",
"Kane",
"Salah"
];

let selectedPlayer = null;

/* Render list */
const list = document.getElementById("playerList");

players.forEach(name=>{
    
    const div = document.createElement("div");
    div.className="player";
    div.innerText=name;

    div.onclick=()=>{
        
        document.querySelectorAll(".player")
        .forEach(p=>p.classList.remove("active"));

        div.classList.add("active");

        selectedPlayer=name;

        document.getElementById("selectedPlayer").innerText=name;
    }

    list.appendChild(div);

});


/* CALL API */

async function sendMessage(){

if(!selectedPlayer){
    alert("Select player first");
    return;
}

document.getElementById("status").innerText="Sending...";

try{

const url="https://script.google.com/a/macros/pushsale.vn/s/AKfycbykLboG6oSDj9ta1oaZOGMPpSGLBWEQvaUDw2AxJXgE4rAJJiE2PnXWAMWSX2AeONQ/exec?action=sendAlertToAllMember";

const response = await fetch(url,{
    method:"GET"
});

const result = await response.text();

document.getElementById("status").innerText="Sent successfully";

}catch(err){

document.getElementById("status").innerText="Error sending message";

}

}

</script>

</body>
</html>
